<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A/B/U 3D Network — mal1: Maladaptive B Fires</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }
    button {
      padding: 8px 16px;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: monospace;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { color: #aaa; font-size: 12px; font-family: monospace; }
    #error  { color: #ff4444; font-size: 12px; font-family: monospace; display: none; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="exportBtn">Download GIF</button>
    <div id="status">Initialising…</div>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"
          onerror="document.getElementById('error').textContent='Failed to load Three.js'; document.getElementById('error').style.display='block'"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"
          onerror="document.getElementById('error').textContent='Failed to load gif.js'; document.getElementById('error').style.display='block'"></script>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const W = 800, H = 600;
    const COLOR_B  = 0x44ff88;
    const COLOR_A  = 0xff4444;
    const RADIUS_B = 6;
    const RADIUS_A = 4;
    const BASE_B   = 5;
    const BASE_A   = 15;
    const SPRING_SETTLE = 300;
    const GIF_FPS  = 30;

    // Person sits to the right, outside the A frontier (~91 world units max radius).
    // Frustum at z=0 is ~±277 × ±208 world units; 210 is visible, well outside A ring.
    const PERSON_X = 210, PERSON_Y = 30, PERSON_Z = 0;

    // ─── Scene ────────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W / H, 1, 2000);
    camera.position.set(0, 0, 360);
    camera.lookAt(0, 0, 0);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const pt = new THREE.PointLight(0xffffff, 1.2, 500);
    pt.position.set(100, 100, 100);
    scene.add(pt);

    // ─── UI ───────────────────────────────────────────────────────────────────
    const statusEl  = document.getElementById('status');
    const errorEl   = document.getElementById('error');
    const exportBtn = document.getElementById('exportBtn');
    function setStatus(m) { statusEl.textContent = m; }
    function setError(m)  { errorEl.textContent = m; errorEl.style.display = m ? 'block' : 'none'; }

    // ─── State ────────────────────────────────────────────────────────────────
    let simNodes = [], simEdges = [], nodes = [], edges = [], nodeById = new Map();
    let animating = false, gifCapturing = false, loopStarted = false;
    // Person objects persisted across animation so they're visible in hold frames
    let personMesh = null, personIcon = null;
    let smokeParticles = [], smokeActive = false;

    // ─── Frustum clamp ───────────────────────────────────────────────────────
    function clampToView(pos) {
      const MARGIN = 0.75;
      const ndc = pos.clone().project(camera);
      if (Math.abs(ndc.x) <= MARGIN && Math.abs(ndc.y) <= MARGIN) return pos;
      const dir = pos.clone().normalize();
      let lo = 0, hi = pos.length();
      for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        const t   = dir.clone().multiplyScalar(mid).project(camera);
        if (Math.abs(t.x) <= MARGIN && Math.abs(t.y) <= MARGIN) lo = mid;
        else hi = mid;
      }
      return dir.multiplyScalar(lo * 0.97);
    }

    // ─── Spring Layout ────────────────────────────────────────────────────────
    function runSpring(ns, es, iters) {
      const KR = 6000, KS = 0.04, KCB = 0.06, KCA = 0.006, DAMP = 0.85;
      for (let iter = 0; iter < iters; iter++) {
        const cool = Math.max(0.01, 1 - iter / (iters + 1));
        for (let i = 0; i < ns.length; i++) {
          for (let j = i + 1; j < ns.length; j++) {
            const a = ns[i], b = ns[j];
            const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
            const d2 = dx*dx + dy*dy + dz*dz + 1;
            const d  = Math.sqrt(d2);
            const f  = KR / d2;
            const fx = f * dx / d, fy = f * dy / d, fz = f * dz / d;
            a.vx -= fx; a.vy -= fy; a.vz -= fz;
            b.vx += fx; b.vy += fy; b.vz += fz;
          }
        }
        for (const e of es) {
          const a = ns[e.si], b = ns[e.ti];
          const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
          const d  = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
          const target = e.weight > 0.6 ? 22 : 42;
          const f  = KS * (d - target);
          const fx = f * dx / d, fy = f * dy / d, fz = f * dz / d;
          a.vx += fx; a.vy += fy; a.vz += fz;
          b.vx -= fx; b.vy -= fy; b.vz -= fz;
        }
        for (const n of ns) {
          const k = n.type === 'B' ? KCB : KCA;
          n.vx -= n.x * k; n.vy -= n.y * k; n.vz -= n.z * k;
        }
        for (const n of ns) {
          n.vx *= DAMP; n.vy *= DAMP; n.vz *= DAMP;
          n.x  += n.vx * cool;
          n.y  += n.vy * cool;
          n.z  += n.vz * cool;
        }
      }
    }

    // ─── Edge helpers ─────────────────────────────────────────────────────────
    function computeCurvePoints(p1, p2, weight) {
      const mid = new THREE.Vector3(
        (p1.x + p2.x) / 2, (p1.y + p2.y) / 2, (p1.z + p2.z) / 2
      );
      const dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
      const lenXY = Math.sqrt(dx*dx + dy*dy);
      const offset = 12 * weight;
      if (lenXY > 0.5) {
        mid.x += (-dy / lenXY) * offset;
        mid.y += ( dx / lenXY) * offset;
      } else {
        const lenXZ = Math.sqrt(dx*dx + dz*dz) || 1;
        mid.x += (-dz / lenXZ) * offset;
        mid.z += ( dx / lenXZ) * offset;
      }
      return new THREE.QuadraticBezierCurve3(p1.clone(), mid, p2.clone()).getPoints(20);
    }

    function makeEdgeLine(p1, p2, weight) {
      const buf = new Float32Array(21 * 3);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true,
        opacity: Math.min(1, 0.15 + weight * 0.55)
      });
      const line = new THREE.Line(geo, mat);
      writeEdgeBuffer(line, p1, p2, weight);
      scene.add(line);
      return line;
    }

    function writeEdgeBuffer(line, p1, p2, weight) {
      const pts = computeCurvePoints(p1, p2, weight);
      const attr = line.geometry.attributes.position;
      for (let i = 0; i < pts.length; i++) {
        attr.array[i*3]   = pts[i].x;
        attr.array[i*3+1] = pts[i].y;
        attr.array[i*3+2] = pts[i].z;
      }
      attr.needsUpdate = true;
    }

    function disposeEdge(line) {
      scene.remove(line);
      line.geometry.dispose();
      line.material.dispose();
    }

    // ─── Build base graph ─────────────────────────────────────────────────────
    function buildBaseGraph() {
      // Clean up person if left over from previous run (e.g. GIF export replay)
      if (personMesh) {
        scene.remove(personMesh); personMesh.geometry.dispose(); personMesh.material.dispose();
        personMesh = null;
      }
      if (personIcon) {
        scene.remove(personIcon); personIcon.material.map.dispose(); personIcon.material.dispose();
        personIcon = null;
      }

      nodes.forEach(n => { scene.remove(n.mesh); n.mesh.geometry.dispose(); n.mesh.material.dispose(); });
      edges.forEach(e => disposeEdge(e.line));
      simNodes = []; simEdges = []; nodes = []; edges = []; nodeById = new Map();
      smokeActive = false; disposeSmoke();

      for (let i = 0; i < BASE_B; i++) {
        simNodes.push({ id: `B${i}`, type: 'B',
          x: (rnd()-0.5)*20, y: (rnd()-0.5)*20, z: (rnd()-0.5)*20, vx:0, vy:0, vz:0 });
      }
      for (let i = 0; i < BASE_A; i++) {
        const ang  = (i / BASE_A) * Math.PI * 2;
        const ring = Math.floor(i / 5);
        const r    = 35 + ring * 28;
        simNodes.push({ id: `A${i}`, type: 'A',
          x: Math.cos(ang)*r + (rnd()-0.5)*12,
          y: Math.sin(ang)*r + (rnd()-0.5)*12,
          z: (rnd()-0.5)*35, vx:0, vy:0, vz:0 });
      }

      for (let i = 0; i < BASE_B; i++)
        for (let j = i+1; j < BASE_B; j++)
          simEdges.push({ si: i, ti: j, weight: 0.7 + rnd()*0.3 });
      for (let i = 0; i < BASE_B; i++) {
        shuffle([...Array(BASE_A).keys()]).slice(0, 3).forEach(j => {
          simEdges.push({ si: i, ti: BASE_B + j, weight: 0.3 + rnd()*0.4 });
        });
      }
      for (let i = 0; i < BASE_A; i++) {
        simEdges.push({ si: BASE_B+i, ti: BASE_B+((i+1)%BASE_A), weight: 0.2+rnd()*0.3 });
        if (i+5 < BASE_A)
          simEdges.push({ si: BASE_B+i, ti: BASE_B+i+5, weight: 0.15+rnd()*0.2 });
      }

      runSpring(simNodes, simEdges, SPRING_SETTLE);

      simNodes.forEach(sn => {
        const geo = new THREE.SphereGeometry(sn.type==='B' ? RADIUS_B : RADIUS_A, 16, 12);
        const mat = new THREE.MeshPhongMaterial({ color: sn.type==='B' ? COLOR_B : COLOR_A, shininess: 60 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(sn.x, sn.y, sn.z);
        scene.add(mesh);
        const node = { id: sn.id, mesh };
        nodes.push(node);
        nodeById.set(sn.id, node);
      });

      simEdges.forEach(se => {
        const p1 = nodes[se.si].mesh.position;
        const p2 = nodes[se.ti].mesh.position;
        const line = makeEdgeLine(p1, p2, se.weight);
        edges.push({ si: se.si, ti: se.ti, weight: se.weight, line });
      });

      // Person: grey sphere + 👤 sprite — present from frame 1
      const personPos = new THREE.Vector3(PERSON_X, PERSON_Y, PERSON_Z);
      personMesh = new THREE.Mesh(
        new THREE.SphereGeometry(5, 16, 12),
        new THREE.MeshPhongMaterial({
          color: 0xdddddd, shininess: 40,
          emissive: new THREE.Color(0, 0, 0), emissiveIntensity: 0
        })
      );
      personMesh.position.copy(personPos);
      scene.add(personMesh);

      personIcon = makePersonSprite();
      personIcon.position.set(personPos.x, personPos.y - 18, personPos.z);
      scene.add(personIcon);
    }

    // ─── Person sprite ────────────────────────────────────────────────────────
    function makePersonSprite() {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.font = '88px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('👤', 64, 64);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 1 });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(30, 30, 1);
      return sprite;
    }

    // ─── Smoke helpers ────────────────────────────────────────────────────────
    // tickSmoke: spawn 1-2 new particles per frame + update + cull dead ones.
    // Call every frame while person is smoking.
    function tickSmoke(pos) {
      const count = rnd() < 0.5 ? 1 : 2;
      for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(1.2 + rnd() * 0.8, 6, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(
          pos.x + (rnd() - 0.5) * 6,
          pos.y + 2 + (rnd() - 0.5) * 2,
          pos.z + (rnd() - 0.5) * 4
        );
        scene.add(mesh);
        smokeParticles.push({ mesh, vx: (rnd() - 0.5) * 0.6, vy: 1.2 + rnd() * 1.0, life: 0, maxLife: 30 + Math.floor(rnd() * 15) });
      }
      for (let i = smokeParticles.length - 1; i >= 0; i--) {
        const p = smokeParticles[i];
        p.life++;
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.vy *= 0.96;
        const t = p.life / p.maxLife;
        p.mesh.material.opacity = 0.7 * (1 - t);
        p.mesh.scale.setScalar(1 + t * 1.5);
        if (p.life >= p.maxLife) {
          scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
          smokeParticles.splice(i, 1);
        }
      }
    }

    function disposeSmoke() {
      for (const p of smokeParticles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
      smokeParticles = [];
    }

    // ─── Animation ───────────────────────────────────────────────────────────
    function runAnimation(onFrame) {
      if (animating) return Promise.resolve();
      animating = true;
      exportBtn.disabled = true;
      setStatus('Animating…');

      return new Promise(resolve => {
        const HOLD_INITIAL  = 20;  // ~0.7s settle view
        const PULSE_FRAMES  = 22;  // beam fades in, dot travels
        const IMPACT_FRAMES = 12;  // orange flash on person, beam fades
        const BURN_FRAMES   = 28;  // emissive flicker — burning effect
        const HOLD_END      = 30;  // smouldering hold — network unchanged

        // Maladaptive B: use B0 (simNodes[0]) — behaves identically to all B nodes
        const malBPos = nodes[0].mesh.position;

        const personPos = new THREE.Vector3(PERSON_X, PERSON_Y, PERSON_Z);

        // Pulse beam: straight fire-red line from B0 to person (straight = distinct from bezier edges)
        const beamGeo = new THREE.BufferGeometry().setFromPoints([
          malBPos.clone(), personPos.clone()
        ]);
        const beamMat = new THREE.LineBasicMaterial({ color: 0xff2200, transparent: true, opacity: 0 });
        const beamLine = new THREE.Line(beamGeo, beamMat);
        beamLine.visible = false;
        scene.add(beamLine);

        // Pulse dot: small bright orange sphere that races along the beam
        const dotGeo = new THREE.SphereGeometry(3, 8, 6);
        const dotMat = new THREE.MeshPhongMaterial({
          color: 0xff6600,
          emissive: new THREE.Color(1, 0.4, 0), emissiveIntensity: 4.0,
          transparent: true, opacity: 1
        });
        const dotMesh = new THREE.Mesh(dotGeo, dotMat);
        dotMesh.position.copy(malBPos);
        dotMesh.visible = false;
        scene.add(dotMesh);

        function disposeBeam() {
          scene.remove(beamLine); beamGeo.dispose(); beamMat.dispose();
          scene.remove(dotMesh);  dotGeo.dispose();  dotMat.dispose();
        }

        // ── Phase 0: initial hold — show network + person, nothing yet ────────
        function phase0() {
          let f = 0;
          function tick() {
            renderFrame(); if (onFrame) onFrame();
            if (++f < HOLD_INITIAL) requestAnimationFrame(tick);
            else phase1();
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 1: B fires — beam fades in, green dot travels to person ─────
        // B node shows NO change: no emissive, no colour change.
        function phase1() {
          beamLine.visible = true;
          dotMesh.visible  = true;
          const origin = malBPos.clone();
          const dest   = personPos.clone();
          let f = 0;
          function tick() {
            const t    = f / PULSE_FRAMES;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            // Beam: fast fade-in to 0.5 opacity then hold
            beamMat.opacity = Math.min(0.50, (f / 5) * 0.50);
            // Dot races along beam
            dotMesh.position.lerpVectors(origin, dest, ease);
            renderFrame(); if (onFrame) onFrame();
            if (++f < PULSE_FRAMES) requestAnimationFrame(tick);
            else phase2();
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 2: impact — person flashes orange, dot splashes, beam fades ─
        function phase2() {
          smokeActive = true;
          dotMesh.position.copy(personPos);
          personMesh.material.color.setHex(0xff6600);
          personMesh.material.emissive.setRGB(1, 0.3, 0);
          personMesh.material.emissiveIntensity = 4.0;
          let f = 0;
          function tick() {
            const t = f / IMPACT_FRAMES;
            personMesh.material.emissiveIntensity = 4.0 * (1 - t * 0.4);
            // Dot splashes: scale up, fade out
            const splash = 1 + t * 3.5;
            dotMesh.scale.set(splash, splash, splash);
            dotMat.opacity = 1 - t;
            // Beam fades out
            beamMat.opacity = 0.50 * (1 - t);
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (++f < IMPACT_FRAMES) requestAnimationFrame(tick);
            else {
              disposeBeam();
              phase3();
            }
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 3: burn — emissive flicker, sphere lerps orange→red ─────────
        // Random flicker simulates fire/burn at the target. B node unchanged.
        function phase3() {
          const orangeColor = new THREE.Color(0xff6600);
          const redColor    = new THREE.Color(0xff0000);
          let f = 0;
          function tick() {
            const t = f / BURN_FRAMES;
            // Flicker: sine wave + noise, decaying amplitude
            const flicker = (2.2 + Math.sin(f * 2.1) * 0.9 + (rnd() - 0.5) * 1.2) * (1 - t * 0.4);
            personMesh.material.emissiveIntensity = Math.max(0.3, flicker);
            // Sphere colour lerps from orange to red over the burn
            personMesh.material.color.lerpColors(orangeColor, redColor, t);
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (++f < BURN_FRAMES) requestAnimationFrame(tick);
            else phase4();
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 4: smoulder hold — person smokes faintly red, network unchanged ─
        function phase4() {
          personMesh.material.color.setHex(0xff0000);
          personMesh.material.emissive.setRGB(0.5, 0, 0);
          personMesh.material.emissiveIntensity = 0.6;
          let f = 0;
          function tick() {
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (++f < HOLD_END) requestAnimationFrame(tick);
            else {
              animating = false;
              exportBtn.disabled = false;
              setStatus('Done.');
              resolve();
            }
          }
          requestAnimationFrame(tick);
        }

        renderFrame(); if (onFrame) onFrame();
        phase0();
      });
    }

    // ─── GIF Export ───────────────────────────────────────────────────────────
    async function createGifEncoder() {
      let workerSrc;
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
        if (!resp.ok) throw new Error('fetch failed');
        const text = await resp.text();
        workerSrc = URL.createObjectURL(new Blob([text], { type: 'application/javascript' }));
      } catch (_) {
        workerSrc = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';
      }
      return new GIF({ workers: 2, quality: 8, width: W, height: H, workerScript: workerSrc });
    }

    async function exportGif() {
      if (gifCapturing || animating) return;
      gifCapturing = true;
      exportBtn.disabled = true;
      setStatus('Preparing GIF encoder…');
      setError('');

      let gif;
      try {
        gif = await createGifEncoder();
      } catch (e) {
        setError('Export failed: could not create GIF encoder.');
        gifCapturing = false;
        exportBtn.disabled = false;
        return;
      }

      const delay = Math.round(1000 / GIF_FPS);
      function captureFrame() {
        gif.addFrame(renderer.domElement, { copy: true, delay });
      }

      buildBaseGraph();
      renderFrame();
      setStatus('Capturing animation…');

      await runAnimation(captureFrame);

      // Extra hold frames with smouldering person visible
      for (let i = 0; i < 30; i++) captureFrame();

      gif.on('finished', blob => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = 'mal1-maladaptive-b-fires.gif';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 200);
        gifCapturing = false;
        exportBtn.disabled = false;
        setStatus('GIF downloaded.');
      });

      gif.on('error', err => {
        setError('Export failed: ' + (err?.message ?? String(err)));
        gifCapturing = false;
        exportBtn.disabled = false;
      });

      setTimeout(() => {
        if (gifCapturing) {
          setError('Export timed out. Try again.');
          gifCapturing = false;
          exportBtn.disabled = false;
        }
      }, 90000);

      setStatus('Rendering GIF (this takes ~20–30s)…');
      gif.render();
    }

    // ─── Utility ─────────────────────────────────────────────────────────────
    function rnd() { return Math.random(); }
    function shuffle(arr) {
      for (let i = arr.length-1; i > 0; i--) {
        const j = Math.floor(rnd()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]];
      }
      return arr;
    }

    // ─── Rotation & render ────────────────────────────────────────────────────
    function renderFrame() {
      const t = performance.now();
      scene.rotation.y = t * 0.00015;
      scene.rotation.x = Math.sin(t * 0.0003) * 0.10;
      renderer.render(scene, camera);
    }

    // ─── Render loop ─────────────────────────────────────────────────────────
    function startRenderLoop() {
      if (loopStarted) return;
      loopStarted = true;
      (function loop() {
        requestAnimationFrame(loop);
        if (!animating && !gifCapturing) {
          if (personMesh && smokeActive) tickSmoke(new THREE.Vector3(PERSON_X, PERSON_Y, PERSON_Z));
          renderFrame();
        }
      })();
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    exportBtn.addEventListener('click', exportGif);

    try {
      buildBaseGraph();
      renderFrame();
      setStatus('Starting animation…');
      startRenderLoop();
      setTimeout(() => runAnimation(null), 600);
    } catch (e) {
      setError('Init error: ' + e.message);
      console.error(e);
    }
  </script>
</body>
</html>
