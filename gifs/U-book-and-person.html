<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A/B/U 3D Network — GIF 3: U Filtering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }
    button {
      padding: 8px 16px;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: monospace;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { color: #aaa; font-size: 12px; font-family: monospace; }
    #error  { color: #ff4444; font-size: 12px; font-family: monospace; display: none; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="exportBtn">Download GIF</button>
    <div id="status">Initialising…</div>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"
          onerror="document.getElementById('error').textContent='Failed to load Three.js'; document.getElementById('error').style.display='block'"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"
          onerror="document.getElementById('error').textContent='Failed to load gif.js'; document.getElementById('error').style.display='block'"></script>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const W = 800, H = 600;
    const COLOR_B  = 0x44ff88;
    const COLOR_A  = 0xff4444;
    const COLOR_U  = 0xaa44ff;
    const RADIUS_B = 6;
    const RADIUS_A = 4;
    const U_RADIUS = 4;
    const BASE_B   = 5;
    const BASE_A   = 15;
    const LERP_FRAMES            = 14;
    const SPRING_SETTLE          = 300;
    const SPRING_UPDATE          = 20;
    const GIF_FPS                = 30;
    const APPROACH_FRAMES        = 40;
    const WOBBLE_CYCLES          = 5;
    const WOBBLE_FRAME_PERIOD    = 12;
    const WOBBLE_AMPLITUDE_START = 14;
    const FADE_FRAMES            = 30;

    // ─── Scene ────────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W / H, 1, 2000);
    camera.position.set(0, 0, 360);
    camera.lookAt(0, 0, 0);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const pt = new THREE.PointLight(0xffffff, 1.2, 500);
    pt.position.set(100, 100, 100);
    scene.add(pt);

    // ─── UI ───────────────────────────────────────────────────────────────────
    const statusEl  = document.getElementById('status');
    const errorEl   = document.getElementById('error');
    const exportBtn = document.getElementById('exportBtn');
    function setStatus(m) { statusEl.textContent = m; }
    function setError(m)  { errorEl.textContent = m; errorEl.style.display = m ? 'block' : 'none'; }

    // ─── State ────────────────────────────────────────────────────────────────
    // simNodes: { id, type, x, y, z, vx, vy, vz }
    // simEdges: { si, ti, weight }
    // nodes:    { id, mesh }
    // edges:    { si, ti, weight, line }
    let simNodes = [], simEdges = [], nodes = [], edges = [], nodeById = new Map();
    let sprites = [];
    let animating = false, gifCapturing = false, loopStarted = false;

    // ─── Frustum clamp ───────────────────────────────────────────────────────
    // Iterative binary search — works regardless of camera/scene orientation.
    function clampToView(pos) {
      const MARGIN = 0.75;
      const ndc = pos.clone().project(camera);
      if (Math.abs(ndc.x) <= MARGIN && Math.abs(ndc.y) <= MARGIN) return pos;
      const dir = pos.clone().normalize();
      let lo = 0, hi = pos.length();
      for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        const t   = dir.clone().multiplyScalar(mid).project(camera);
        if (Math.abs(t.x) <= MARGIN && Math.abs(t.y) <= MARGIN) lo = mid;
        else hi = mid;
      }
      return dir.multiplyScalar(lo * 0.97);
    }

    // ─── Spring Layout ────────────────────────────────────────────────────────
    function runSpring(ns, es, iters) {
      const KR = 6000, KS = 0.04, KCB = 0.06, KCA = 0.006, DAMP = 0.85;
      for (let iter = 0; iter < iters; iter++) {
        const cool = Math.max(0.01, 1 - iter / (iters + 1));
        // Repulsion
        for (let i = 0; i < ns.length; i++) {
          for (let j = i + 1; j < ns.length; j++) {
            const a = ns[i], b = ns[j];
            const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
            const d2 = dx*dx + dy*dy + dz*dz + 1;
            const d  = Math.sqrt(d2);
            const f  = KR / d2;
            const fx = f * dx / d, fy = f * dy / d, fz = f * dz / d;
            a.vx -= fx; a.vy -= fy; a.vz -= fz;
            b.vx += fx; b.vy += fy; b.vz += fz;
          }
        }
        // Spring attraction along edges
        for (const e of es) {
          const a = ns[e.si], b = ns[e.ti];
          const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
          const d  = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
          const target = e.weight > 0.6 ? 22 : 42;
          const f  = KS * (d - target);
          const fx = f * dx / d, fy = f * dy / d, fz = f * dz / d;
          a.vx += fx; a.vy += fy; a.vz += fz;
          b.vx -= fx; b.vy -= fy; b.vz -= fz;
        }
        // Centre pull
        for (const n of ns) {
          const k = n.type === 'B' ? KCB : KCA;
          n.vx -= n.x * k; n.vy -= n.y * k; n.vz -= n.z * k;
        }
        // Integrate
        for (const n of ns) {
          n.vx *= DAMP; n.vy *= DAMP; n.vz *= DAMP;
          n.x  += n.vx * cool;
          n.y  += n.vy * cool;
          n.z  += n.vz * cool;
        }
      }
    }

    // ─── Edge helpers ─────────────────────────────────────────────────────────
    function computeCurvePoints(p1, p2, weight) {
      const mid = new THREE.Vector3(
        (p1.x + p2.x) / 2, (p1.y + p2.y) / 2, (p1.z + p2.z) / 2
      );
      const dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
      const lenXY = Math.sqrt(dx*dx + dy*dy);
      const offset = 12 * weight;
      if (lenXY > 0.5) {
        mid.x += (-dy / lenXY) * offset;
        mid.y += ( dx / lenXY) * offset;
      } else {
        const lenXZ = Math.sqrt(dx*dx + dz*dz) || 1;
        mid.x += (-dz / lenXZ) * offset;
        mid.z += ( dx / lenXZ) * offset;
      }
      return new THREE.QuadraticBezierCurve3(p1.clone(), mid, p2.clone()).getPoints(20);
    }

    function makeEdgeLine(p1, p2, weight) {
      const buf = new Float32Array(21 * 3);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true,
        opacity: Math.min(1, 0.15 + weight * 0.55)
      });
      const line = new THREE.Line(geo, mat);
      writeEdgeBuffer(line, p1, p2, weight);
      scene.add(line);
      return line;
    }

    function writeEdgeBuffer(line, p1, p2, weight) {
      const pts = computeCurvePoints(p1, p2, weight);
      const attr = line.geometry.attributes.position;
      for (let i = 0; i < pts.length; i++) {
        attr.array[i*3]   = pts[i].x;
        attr.array[i*3+1] = pts[i].y;
        attr.array[i*3+2] = pts[i].z;
      }
      attr.needsUpdate = true;
    }

    function disposeEdge(line) {
      scene.remove(line);
      line.geometry.dispose();
      line.material.dispose();
    }

    // ─── Build base graph ─────────────────────────────────────────────────────
    function buildBaseGraph() {
      nodes.forEach(n => { scene.remove(n.mesh); n.mesh.geometry.dispose(); n.mesh.material.dispose(); });
      edges.forEach(e => disposeEdge(e.line));
      sprites.forEach(s => { scene.remove(s); s.material.map?.dispose(); s.material.dispose(); });
      simNodes = []; simEdges = []; nodes = []; edges = []; nodeById = new Map(); sprites = [];

      for (let i = 0; i < BASE_B; i++) {
        simNodes.push({ id: `B${i}`, type: 'B',
          x: (rnd()-0.5)*20, y: (rnd()-0.5)*20, z: (rnd()-0.5)*20, vx:0, vy:0, vz:0 });
      }
      for (let i = 0; i < BASE_A; i++) {
        const ang  = (i / BASE_A) * Math.PI * 2;
        const ring = Math.floor(i / 5);
        const r    = 35 + ring * 28;
        simNodes.push({ id: `A${i}`, type: 'A',
          x: Math.cos(ang)*r + (rnd()-0.5)*12,
          y: Math.sin(ang)*r + (rnd()-0.5)*12,
          z: (rnd()-0.5)*35, vx:0, vy:0, vz:0 });
      }

      // B–B edges (strong)
      for (let i = 0; i < BASE_B; i++)
        for (let j = i+1; j < BASE_B; j++)
          simEdges.push({ si: i, ti: j, weight: 0.7 + rnd()*0.3 });
      // B → 3 random As
      for (let i = 0; i < BASE_B; i++) {
        shuffle([...Array(BASE_A).keys()]).slice(0, 3).forEach(j => {
          simEdges.push({ si: i, ti: BASE_B + j, weight: 0.3 + rnd()*0.4 });
        });
      }
      // A ring neighbours + cross-ring
      for (let i = 0; i < BASE_A; i++) {
        simEdges.push({ si: BASE_B+i, ti: BASE_B+((i+1)%BASE_A), weight: 0.2+rnd()*0.3 });
        if (i+5 < BASE_A)
          simEdges.push({ si: BASE_B+i, ti: BASE_B+i+5, weight: 0.15+rnd()*0.2 });
      }

      runSpring(simNodes, simEdges, SPRING_SETTLE);

      simNodes.forEach(sn => {
        const geo = new THREE.SphereGeometry(sn.type==='B' ? RADIUS_B : RADIUS_A, 16, 12);
        const mat = new THREE.MeshPhongMaterial({ color: sn.type==='B' ? COLOR_B : COLOR_A, shininess: 60 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(sn.x, sn.y, sn.z);
        scene.add(mesh);
        const node = { id: sn.id, mesh };
        nodes.push(node);
        nodeById.set(sn.id, node);
      });

      simEdges.forEach(se => {
        const p1 = nodes[se.si].mesh.position;
        const p2 = nodes[se.ti].mesh.position;
        const line = makeEdgeLine(p1, p2, se.weight);
        edges.push({ si: se.si, ti: se.ti, weight: se.weight, line });
      });
    }

    // ─── Icon sprites ─────────────────────────────────────────────────────────
    // Returns a THREE.Sprite with a 32×32 canvas icon drawn on it.
    function makeIconSprite(symbol) {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.font = '88px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(symbol === 'book' ? '📖' : '👤', 64, 64);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 1 });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(30, 30, 1);
      return sprite;
    }

    // ─── GIF 3 Animation ─────────────────────────────────────────────────────
    function runGif3Animation(onFrame) {
      if (animating) return Promise.resolve();
      animating = true;
      exportBtn.disabled = true;
      setStatus('Animating…');

      return new Promise(resolve => {

        // ── Target selection ──────────────────────────────────────────────────
        // A10 and A13 are both in the outermost ring (ring 2), well-separated.
        // simNodes indices: B0-B4 are [0..4], A0-A14 are [5..19].
        const targetA1_simIdx = BASE_B + 10; // 15
        const targetA2_simIdx = BASE_B + 13; // 18

        const t1Pos = nodes[targetA1_simIdx].mesh.position;
        const t2Pos = nodes[targetA2_simIdx].mesh.position;

        // Outward unit vectors from origin through each target
        const approachDir1 = t1Pos.clone().normalize();
        const approachDir2 = t2Pos.clone().normalize();

        // U start positions: beyond the graph frontier, clamped to view boundary
        const u1Start = clampToView(approachDir1.clone().multiplyScalar(t1Pos.length() + 85));
        const u2Start = clampToView(approachDir2.clone().multiplyScalar(t2Pos.length() + 85));

        // Arrival: 18 units closer to centre than the target
        const u1Arrival = t1Pos.clone().sub(approachDir1.clone().multiplyScalar(18));
        const u2Arrival = t2Pos.clone().sub(approachDir2.clone().multiplyScalar(18));

        // ── Create U meshes ───────────────────────────────────────────────────
        function makeUMesh(pos) {
          const geo = new THREE.SphereGeometry(U_RADIUS, 16, 12);
          const mat = new THREE.MeshPhongMaterial({
            color: COLOR_U, shininess: 80, transparent: true, opacity: 1,
            emissive: new THREE.Color(0.4, 0.1, 0.8), emissiveIntensity: 2.0
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.copy(pos);
          mesh.scale.set(0.01, 0.01, 0.01);
          scene.add(mesh);
          return mesh;
        }

        const u1Mesh = makeUMesh(u1Start);
        const u2Mesh = makeUMesh(u2Start);

        // ── Icon sprites ──────────────────────────────────────────────────────
        const u1Icon = makeIconSprite('book');
        const u2Icon = makeIconSprite('person');
        scene.add(u1Icon);
        scene.add(u2Icon);
        sprites.push(u1Icon, u2Icon);

        function syncIcons() {
          u1Icon.position.set(u1Mesh.position.x, u1Mesh.position.y - 14, u1Mesh.position.z);
          u2Icon.position.set(u2Mesh.position.x, u2Mesh.position.y - 14, u2Mesh.position.z);
        }
        syncIcons();

        // ── Initial hold — show base graph before Us appear ───────────────────
        renderFrame();
        if (onFrame) { for (let i = 0; i < 15; i++) onFrame(); }

        // ── Phase 1: Pop spawn ────────────────────────────────────────────────
        let popFrame = 0;
        function popStep() {
          popFrame++;
          const t = popFrame / 8;
          // Ease-out-cubic scale from 0 → 1
          const s = t < 0.5 ? 4*t*t*t : 1 - ((-2*t+2)**3) / 2;
          u1Mesh.scale.set(s, s, s);
          u2Mesh.scale.set(s, s, s);
          syncIcons();
          renderFrame();
          if (onFrame) onFrame();
          if (popFrame < 8) {
            requestAnimationFrame(popStep);
          } else {
            if (onFrame) { for (let i = 0; i < 6; i++) onFrame(); startApproach(); }
            else setTimeout(startApproach, 200);
          }
        }
        requestAnimationFrame(popStep);

        // ── Phase 2: Approach — both Us travel inward simultaneously ──────────
        function startApproach() {
          let frame = 0;
          function approachStep() {
            frame++;
            const t    = frame / APPROACH_FRAMES;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

            u1Mesh.position.lerpVectors(u1Start, u1Arrival, ease);
            u2Mesh.position.lerpVectors(u2Start, u2Arrival, ease);
            syncIcons();

            // Emissive dims as they settle in
            const emissive = 2.0 * (1 - t * 0.8);
            u1Mesh.material.emissiveIntensity = emissive;
            u2Mesh.material.emissiveIntensity = emissive;

            renderFrame();
            if (onFrame) onFrame();
            if (frame < APPROACH_FRAMES) {
              requestAnimationFrame(approachStep);
            } else {
              if (onFrame) { for (let i = 0; i < 8; i++) onFrame(); startSnap(); }
              else setTimeout(startSnap, 260);
            }
          }
          requestAnimationFrame(approachStep);
        }

        // ── Phase 3: U1 snap — colour change, spring, lerp ───────────────────
        function startSnap() {
          // Instant colour snap: purple → red
          u1Mesh.material.color.setHex(COLOR_A);
          u1Mesh.material.emissive.set(1, 0.3, 0.3);
          u1Mesh.material.emissiveIntensity = 2.0;

          // Add U1 to sim so spring can act on it
          const u1SimNode = {
            id: 'U1', type: 'A',
            x: u1Mesh.position.x, y: u1Mesh.position.y, z: u1Mesh.position.z,
            vx: 0, vy: 0, vz: 0
          };
          const u1Idx = simNodes.length;
          simNodes.push(u1SimNode);
          nodes.push({ id: 'U1', mesh: u1Mesh });
          nodeById.set('U1', nodes[u1Idx]);

          // Connect U1 to 2 nearest existing As
          const spawnPt = u1Mesh.position.clone();
          const nearAs = nodes
            .slice(0, u1Idx)                               // exclude U1 itself
            .map((nd, i) => ({ i, dist: nd.mesh.position.distanceTo(spawnPt) }))
            .filter(({ i }) => simNodes[i] && simNodes[i].type === 'A')
            .sort((a, b) => a.dist - b.dist)
            .slice(0, 2);

          nearAs.forEach(({ i, dist }) => {
            const w = Math.max(0.3, Math.min(0.8, 1 - dist / 120));
            simEdges.push({ si: u1Idx, ti: i, weight: w });
            const line = makeEdgeLine(u1Mesh.position, nodes[i].mesh.position, w);
            edges.push({ si: u1Idx, ti: i, weight: w, line });
          });

          // Spring settle
          runSpring(simNodes, simEdges, SPRING_UPDATE);

          // Clamp all nodes — repulsion from U1 may push settled nodes off-screen
          simNodes.forEach(sn => {
            const p = new THREE.Vector3(sn.x, sn.y, sn.z);
            const ndc = p.clone().project(camera);
            if (Math.abs(ndc.x) > 0.75 || Math.abs(ndc.y) > 0.75) {
              const c = clampToView(p);
              sn.x = c.x; sn.y = c.y; sn.z = c.z;
              sn.vx = 0; sn.vy = 0; sn.vz = 0;
            }
          });

          // Snapshot start positions for lerp
          const startPos = new Map();
          nodes.forEach(nd => startPos.set(nd.id, nd.mesh.position.clone()));

          let frame = 0;
          function snapLerp() {
            frame++;
            const t    = frame / LERP_FRAMES;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

            simNodes.forEach((sn, i) => {
              const nd = nodes[i];
              if (!nd) return;
              const s = startPos.get(nd.id);
              if (!s) return;
              nd.mesh.position.set(
                s.x + (sn.x - s.x) * ease,
                s.y + (sn.y - s.y) * ease,
                s.z + (sn.z - s.z) * ease
              );
            });

            // U1 icon follows its mesh; U2 stays at arrival during snap
            u1Icon.position.set(u1Mesh.position.x, u1Mesh.position.y - 14, u1Mesh.position.z);

            // Emissive flash fades
            u1Mesh.material.emissiveIntensity = Math.max(0, 2.0 * (1 - t));

            // Update all base-graph edges in-place
            edges.forEach(e => {
              const p1 = nodes[e.si]?.mesh.position;
              const p2 = nodes[e.ti]?.mesh.position;
              if (p1 && p2) writeEdgeBuffer(e.line, p1, p2, e.weight);
            });

            renderFrame();
            if (onFrame) onFrame();
            if (frame < LERP_FRAMES) {
              requestAnimationFrame(snapLerp);
            } else {
              if (onFrame) { for (let i = 0; i < 8; i++) onFrame(); startWobble(); }
              else setTimeout(startWobble, 260);
            }
          }
          requestAnimationFrame(snapLerp);
        }

        // ── Phase 4: U2 wobble — oscillates near target with flickering edge ──
        function startWobble() {
          // Flickering edge signals weak / attempted binding (managed separately from edges[])
          const flickerLine = makeEdgeLine(
            u2Mesh.position,
            nodes[targetA2_simIdx].mesh.position,
            0.15
          );

          const arrivalPos  = u2Mesh.position.clone();
          // Wobble axis perpendicular to approach direction in the XY plane
          const wobbleAxis  = new THREE.Vector3(
            -approachDir2.y, approachDir2.x, 0
          ).normalize();

          let wobbleFrame = 0;
          const totalWobbleFrames = WOBBLE_CYCLES * WOBBLE_FRAME_PERIOD;

          function wobbleStep() {
            wobbleFrame++;
            const phase     = (wobbleFrame / WOBBLE_FRAME_PERIOD) * Math.PI * 2;
            // Amplitude decays slightly each cycle — losing grip
            const amplitude = WOBBLE_AMPLITUDE_START * (1 - (wobbleFrame / totalWobbleFrames) * 0.3);

            u2Mesh.position.set(
              arrivalPos.x + wobbleAxis.x * Math.sin(phase) * amplitude,
              arrivalPos.y + wobbleAxis.y * Math.sin(phase) * amplitude,
              arrivalPos.z
            );
            u2Icon.position.set(u2Mesh.position.x, u2Mesh.position.y - 14, u2Mesh.position.z);

            // Flicker: randomise opacity each frame (crackling unstable bond)
            flickerLine.material.opacity = 0.05 + Math.random() * 0.20;
            writeEdgeBuffer(flickerLine, u2Mesh.position, nodes[targetA2_simIdx].mesh.position, 0.15);

            renderFrame();
            if (onFrame) onFrame();
            if (wobbleFrame < totalWobbleFrames) {
              requestAnimationFrame(wobbleStep);
            } else {
              startFade(flickerLine);
            }
          }
          requestAnimationFrame(wobbleStep);
        }

        // ── Phase 5: U2 fade — bond breaks, drifts outward, disappears ────────
        function startFade(flickerLine) {
          // Bond breaks — remove flickering edge immediately
          disposeEdge(flickerLine);

          const fadeStartPos = u2Mesh.position.clone();
          // Drift outward: back along the original approach direction (away from graph)
          const driftDir = approachDir2.clone();

          let fadeFrame = 0;
          function fadeStep() {
            fadeFrame++;
            const t       = fadeFrame / FADE_FRAMES;
            const opacity = Math.max(0, 1 - t);

            u2Mesh.material.opacity = opacity;
            u2Icon.material.opacity = opacity;

            u2Mesh.position.set(
              fadeStartPos.x + driftDir.x * 35 * t,
              fadeStartPos.y + driftDir.y * 35 * t,
              fadeStartPos.z + driftDir.z * 35 * t
            );
            u2Icon.position.set(u2Mesh.position.x, u2Mesh.position.y - 14, u2Mesh.position.z);

            renderFrame();
            if (onFrame) onFrame();
            if (fadeFrame < FADE_FRAMES) {
              requestAnimationFrame(fadeStep);
            } else {
              // Clean up U2 fully
              scene.remove(u2Mesh);
              u2Mesh.geometry.dispose();
              u2Mesh.material.dispose();
              scene.remove(u2Icon);
              u2Icon.material.map.dispose();
              u2Icon.material.dispose();

              animating = false;
              exportBtn.disabled = false;
              setStatus('Done.');
              resolve();
            }
          }
          requestAnimationFrame(fadeStep);
        }

      }); // end Promise
    }

    // ─── GIF Export ───────────────────────────────────────────────────────────
    async function createGifEncoder() {
      let workerSrc;
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
        if (!resp.ok) throw new Error('fetch failed');
        const text = await resp.text();
        workerSrc = URL.createObjectURL(new Blob([text], { type: 'application/javascript' }));
      } catch (_) {
        workerSrc = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';
      }
      return new GIF({ workers: 2, quality: 8, width: W, height: H, workerScript: workerSrc });
    }

    async function exportGif() {
      if (gifCapturing || animating) return;
      gifCapturing = true;
      exportBtn.disabled = true;
      setStatus('Preparing GIF encoder…');
      setError('');

      let gif;
      try {
        gif = await createGifEncoder();
      } catch (e) {
        setError('Export failed: could not create GIF encoder.');
        gifCapturing = false;
        exportBtn.disabled = false;
        return;
      }

      const delay = Math.round(1000 / GIF_FPS);
      function captureFrame() {
        gif.addFrame(renderer.domElement, { copy: true, delay });
      }

      buildBaseGraph();
      renderFrame();
      setStatus('Capturing animation…');

      await runGif3Animation(captureFrame);

      // Hold end state for ~1s
      for (let i = 0; i < 30; i++) captureFrame();

      gif.on('finished', blob => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = 'gif3-u-filtering.gif';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 200);
        gifCapturing = false;
        exportBtn.disabled = false;
        setStatus('GIF downloaded.');
      });

      gif.on('error', err => {
        setError('Export failed: ' + (err?.message ?? String(err)));
        gifCapturing = false;
        exportBtn.disabled = false;
      });

      // Safety timeout — prevents a hung encoder locking the UI
      setTimeout(() => {
        if (gifCapturing) {
          setError('Export timed out. Try again.');
          gifCapturing = false;
          exportBtn.disabled = false;
        }
      }, 90000);

      setStatus('Rendering GIF (this takes ~20–30s)…');
      gif.render();
    }

    // ─── Utility ─────────────────────────────────────────────────────────────
    function rnd() { return Math.random(); }
    function shuffle(arr) {
      for (let i = arr.length-1; i > 0; i--) {
        const j = Math.floor(rnd()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]];
      }
      return arr;
    }

    // ─── Rotation & render ────────────────────────────────────────────────────
    // Identical rotation parameters to index.html (GIF 1) for visual consistency.
    function renderFrame() {
      const t = performance.now();
      scene.rotation.y = t * 0.00015;
      scene.rotation.x = Math.sin(t * 0.0003) * 0.10;
      renderer.render(scene, camera);
    }

    // ─── Render loop ─────────────────────────────────────────────────────────
    function startRenderLoop() {
      if (loopStarted) return;
      loopStarted = true;
      (function loop() {
        requestAnimationFrame(loop);
        if (!animating && !gifCapturing) renderFrame();
      })();
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    exportBtn.addEventListener('click', exportGif);

    try {
      buildBaseGraph();
      renderFrame();
      setStatus('Starting animation…');
      startRenderLoop();
      setTimeout(() => runGif3Animation(null), 600);
    } catch (e) {
      setError('Init error: ' + e.message);
      console.error(e);
    }
  </script>
</body>
</html>
