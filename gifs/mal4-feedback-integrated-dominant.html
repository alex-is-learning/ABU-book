<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A/B/U 3D Network — mal4: Feedback Integrated (Dominant)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }
    button {
      padding: 8px 16px;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: monospace;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { color: #aaa; font-size: 12px; font-family: monospace; }
    #error  { color: #ff4444; font-size: 12px; font-family: monospace; display: none; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="exportBtn">Download GIF</button>
    <div id="status">Initialising…</div>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"
          onerror="document.getElementById('error').textContent='Failed to load Three.js'; document.getElementById('error').style.display='block'"></script>
  <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"
          onerror="document.getElementById('error').textContent='Failed to load gif.js'; document.getElementById('error').style.display='block'"></script>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const W = 800, H = 600;
    const COLOR_B  = 0x44ff88;
    const COLOR_A  = 0xff4444;
    const COLOR_U  = 0xaa44ff;
    const RADIUS_B = 6;
    const RADIUS_A = 4;
    const BASE_B   = 5;
    const BASE_A   = 15;
    const SPRING_SETTLE = 300;
    const GIF_FPS  = 30;

    // Person position — same as mal2/mal3
    const PERSON_X = 210, PERSON_Y = 30, PERSON_Z = 0;

    // ─── Scene ────────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(W, H);
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W / H, 1, 2000);
    camera.position.set(0, 0, 360);
    camera.lookAt(0, 0, 0);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const pt = new THREE.PointLight(0xffffff, 1.2, 500);
    pt.position.set(100, 100, 100);
    scene.add(pt);

    // ─── UI ───────────────────────────────────────────────────────────────────
    const statusEl  = document.getElementById('status');
    const errorEl   = document.getElementById('error');
    const exportBtn = document.getElementById('exportBtn');
    function setStatus(m) { statusEl.textContent = m; }
    function setError(m)  { errorEl.textContent = m; errorEl.style.display = m ? 'block' : 'none'; }

    // ─── State ────────────────────────────────────────────────────────────────
    let simNodes = [], simEdges = [], nodes = [], edges = [], nodeById = new Map();
    let animating = false, gifCapturing = false, loopStarted = false;
    let personMesh = null, personIcon = null;
    let smokeParticles = [];

    // ─── Frustum clamp ───────────────────────────────────────────────────────
    function clampToView(pos) {
      const MARGIN = 0.75;
      const ndc = pos.clone().project(camera);
      if (Math.abs(ndc.x) <= MARGIN && Math.abs(ndc.y) <= MARGIN) return pos;
      const dir = pos.clone().normalize();
      let lo = 0, hi = pos.length();
      for (let i = 0; i < 24; i++) {
        const mid = (lo + hi) / 2;
        const t   = dir.clone().multiplyScalar(mid).project(camera);
        if (Math.abs(t.x) <= MARGIN && Math.abs(t.y) <= MARGIN) lo = mid;
        else hi = mid;
      }
      return dir.multiplyScalar(lo * 0.97);
    }

    // ─── Spring Layout ────────────────────────────────────────────────────────
    function runSpring(ns, es, iters) {
      const KR = 6000, KS = 0.04, KCB = 0.06, KCA = 0.006, DAMP = 0.85;
      for (let iter = 0; iter < iters; iter++) {
        const cool = Math.max(0.01, 1 - iter / (iters + 1));
        for (let i = 0; i < ns.length; i++) {
          for (let j = i + 1; j < ns.length; j++) {
            const a = ns[i], b = ns[j];
            const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
            const d2 = dx*dx + dy*dy + dz*dz + 1;
            const d  = Math.sqrt(d2);
            const f  = KR / d2;
            const fx = f * dx / d, fy = f * dy / d, fz = f * dz / d;
            a.vx -= fx; a.vy -= fy; a.vz -= fz;
            b.vx += fx; b.vy += fy; b.vz += fz;
          }
        }
        for (const e of es) {
          const a = ns[e.si], b = ns[e.ti];
          const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
          const d  = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.01;
          const target = e.weight > 0.6 ? 22 : 42;
          const f  = KS * (d - target);
          const fx = f * dx / d, fy = f * dy / d, fz = f * dz / d;
          a.vx += fx; a.vy += fy; a.vz += fz;
          b.vx -= fx; b.vy -= fy; b.vz -= fz;
        }
        for (const n of ns) {
          const k = n.type === 'B' ? KCB : KCA;
          n.vx -= n.x * k; n.vy -= n.y * k; n.vz -= n.z * k;
        }
        for (const n of ns) {
          n.vx *= DAMP; n.vy *= DAMP; n.vz *= DAMP;
          n.x  += n.vx * cool;
          n.y  += n.vy * cool;
          n.z  += n.vz * cool;
        }
      }
    }

    // ─── Edge helpers ─────────────────────────────────────────────────────────
    function computeCurvePoints(p1, p2, weight) {
      const mid = new THREE.Vector3(
        (p1.x + p2.x) / 2, (p1.y + p2.y) / 2, (p1.z + p2.z) / 2
      );
      const dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
      const lenXY = Math.sqrt(dx*dx + dy*dy);
      const offset = 12 * weight;
      if (lenXY > 0.5) {
        mid.x += (-dy / lenXY) * offset;
        mid.y += ( dx / lenXY) * offset;
      } else {
        const lenXZ = Math.sqrt(dx*dx + dz*dz) || 1;
        mid.x += (-dz / lenXZ) * offset;
        mid.z += ( dx / lenXZ) * offset;
      }
      return new THREE.QuadraticBezierCurve3(p1.clone(), mid, p2.clone()).getPoints(20);
    }

    function makeEdgeLine(p1, p2, weight) {
      const buf = new Float32Array(21 * 3);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(buf, 3));
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff, transparent: true,
        opacity: Math.min(1, 0.15 + weight * 0.55)
      });
      const line = new THREE.Line(geo, mat);
      writeEdgeBuffer(line, p1, p2, weight);
      scene.add(line);
      return line;
    }

    function writeEdgeBuffer(line, p1, p2, weight) {
      const pts = computeCurvePoints(p1, p2, weight);
      const attr = line.geometry.attributes.position;
      for (let i = 0; i < pts.length; i++) {
        attr.array[i*3]   = pts[i].x;
        attr.array[i*3+1] = pts[i].y;
        attr.array[i*3+2] = pts[i].z;
      }
      attr.needsUpdate = true;
    }

    function disposeEdge(line) {
      scene.remove(line);
      line.geometry.dispose();
      line.material.dispose();
    }

    // ─── Smoke helpers ────────────────────────────────────────────────────────
    function tickSmoke(pos) {
      const count = rnd() < 0.5 ? 1 : 2;
      for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(1.2 + rnd() * 0.8, 6, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(
          pos.x + (rnd() - 0.5) * 6,
          pos.y + 2 + (rnd() - 0.5) * 2,
          pos.z + (rnd() - 0.5) * 4
        );
        scene.add(mesh);
        smokeParticles.push({ mesh, vx: (rnd() - 0.5) * 0.6, vy: 1.2 + rnd() * 1.0, life: 0, maxLife: 30 + Math.floor(rnd() * 15) });
      }
      for (let i = smokeParticles.length - 1; i >= 0; i--) {
        const p = smokeParticles[i];
        p.life++;
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.vy *= 0.96;
        const t = p.life / p.maxLife;
        p.mesh.material.opacity = 0.7 * (1 - t);
        p.mesh.scale.setScalar(1 + t * 1.5);
        if (p.life >= p.maxLife) {
          scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
          smokeParticles.splice(i, 1);
        }
      }
    }

    function disposeSmoke() {
      for (const p of smokeParticles) {
        scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose();
      }
      smokeParticles = [];
    }

    // ─── Icon sprite ──────────────────────────────────────────────────────────
    function makeIconSprite(symbol) {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.font = '88px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(symbol, 64, 64);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 1 });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(30, 30, 1);
      return sprite;
    }

    // ─── Build base graph ─────────────────────────────────────────────────────
    function buildBaseGraph() {
      if (personMesh) {
        scene.remove(personMesh); personMesh.geometry.dispose(); personMesh.material.dispose();
        personMesh = null;
      }
      if (personIcon) {
        scene.remove(personIcon); personIcon.material.map.dispose(); personIcon.material.dispose();
        personIcon = null;
      }
      disposeSmoke();
      nodes.forEach(n => { scene.remove(n.mesh); n.mesh.geometry.dispose(); n.mesh.material.dispose(); });
      edges.forEach(e => disposeEdge(e.line));
      simNodes = []; simEdges = []; nodes = []; edges = []; nodeById = new Map();

      for (let i = 0; i < BASE_B; i++) {
        simNodes.push({ id: `B${i}`, type: 'B',
          x: (rnd()-0.5)*20, y: (rnd()-0.5)*20, z: (rnd()-0.5)*20, vx:0, vy:0, vz:0 });
      }
      for (let i = 0; i < BASE_A; i++) {
        const ang  = (i / BASE_A) * Math.PI * 2;
        const ring = Math.floor(i / 5);
        const r    = 35 + ring * 28;
        simNodes.push({ id: `A${i}`, type: 'A',
          x: Math.cos(ang)*r + (rnd()-0.5)*12,
          y: Math.sin(ang)*r + (rnd()-0.5)*12,
          z: (rnd()-0.5)*35, vx:0, vy:0, vz:0 });
      }

      for (let i = 0; i < BASE_B; i++)
        for (let j = i+1; j < BASE_B; j++)
          simEdges.push({ si: i, ti: j, weight: 0.7 + rnd()*0.3 });
      for (let i = 0; i < BASE_B; i++) {
        shuffle([...Array(BASE_A).keys()]).slice(0, 3).forEach(j => {
          simEdges.push({ si: i, ti: BASE_B + j, weight: 0.3 + rnd()*0.4 });
        });
      }
      for (let i = 0; i < BASE_A; i++) {
        simEdges.push({ si: BASE_B+i, ti: BASE_B+((i+1)%BASE_A), weight: 0.2+rnd()*0.3 });
        if (i+5 < BASE_A)
          simEdges.push({ si: BASE_B+i, ti: BASE_B+i+5, weight: 0.15+rnd()*0.2 });
      }

      runSpring(simNodes, simEdges, SPRING_SETTLE);

      simNodes.forEach(sn => {
        const geo = new THREE.SphereGeometry(sn.type==='B' ? RADIUS_B : RADIUS_A, 16, 12);
        const mat = new THREE.MeshPhongMaterial({ color: sn.type==='B' ? COLOR_B : COLOR_A, shininess: 60 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(sn.x, sn.y, sn.z);
        scene.add(mesh);
        const node = { id: sn.id, mesh };
        nodes.push(node);
        nodeById.set(sn.id, node);
      });

      simEdges.forEach(se => {
        const p1 = nodes[se.si].mesh.position;
        const p2 = nodes[se.ti].mesh.position;
        const line = makeEdgeLine(p1, p2, se.weight);
        edges.push({ si: se.si, ti: se.ti, weight: se.weight, line });
      });

      // Person: red smouldering sphere + 👤 sprite — mal2 end-state, present from frame 1
      const personPos = new THREE.Vector3(PERSON_X, PERSON_Y, PERSON_Z);
      personMesh = new THREE.Mesh(
        new THREE.SphereGeometry(5, 16, 12),
        new THREE.MeshPhongMaterial({
          color: 0xff0000, shininess: 30,
          emissive: new THREE.Color(0.5, 0, 0), emissiveIntensity: 0.6
        })
      );
      personMesh.position.copy(personPos);
      scene.add(personMesh);

      personIcon = makeIconSprite('👤');
      personIcon.position.set(personPos.x, personPos.y - 18, personPos.z);
      scene.add(personIcon);
    }

    // ─── Animation ───────────────────────────────────────────────────────────
    function runAnimation(onFrame) {
      if (animating) return Promise.resolve();
      animating = true;
      exportBtn.disabled = true;
      setStatus('Animating…');

      return new Promise(resolve => {
        const HOLD_INITIAL    = 15;
        const CHARGE_FRAMES   = 12;
        const APPROACH_FRAMES = 42;
        const SNAP_FRAMES     = 16;  // doubled
        const SNAP_SPRING     = 20;
        const LERP_FRAMES     = 28;  // doubled
        const SIZE_FRAMES     = 28;  // doubled
        const MATURE_SPRING   = 55;
        const MATURE_LERP     = 76;  // doubled
        const ORBIT_FRAMES    = 90;
        const SCALE_FRAMES    = 45;
        const ORBIT_SPEED     = 0.018;
        const MIN_ORBIT_R     = 22;

        const personPos = new THREE.Vector3(PERSON_X, PERSON_Y, PERSON_Z);

        // Pick the outermost A node (same logic as mal3)
        const outerA = simNodes
          .map((sn, i) => ({ sn, i, d: sn.x*sn.x + sn.y*sn.y + sn.z*sn.z }))
          .filter(n => n.sn.type === 'A')
          .sort((a, b) => b.d - a.d)[0];
        const targetAIdx = outerA.i;
        const targetAPos = nodes[targetAIdx].mesh.position;

        // Signal travels FROM the person TO the outer A frontier
        const approachDir = targetAPos.clone().sub(personPos).normalize();
        const uStart   = personPos.clone();
        const uArrival = targetAPos.clone().sub(approachDir.clone().multiplyScalar(20));

        const uGeo = new THREE.SphereGeometry(RADIUS_A, 16, 12);
        const uMat = new THREE.MeshPhongMaterial({
          color: COLOR_U, shininess: 80, transparent: true, opacity: 1,
          emissive: new THREE.Color(0.3, 0.1, 0.7), emissiveIntensity: 1.5
        });
        const uMesh = new THREE.Mesh(uGeo, uMat);
        uMesh.position.copy(uStart);
        uMesh.scale.set(0.01, 0.01, 0.01);
        scene.add(uMesh);

        // ── Phase 0: initial hold — smouldering person, network settled ───────
        function phase0() {
          let f = 0;
          function tick() {
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (++f < HOLD_INITIAL) requestAnimationFrame(tick);
            else phase1();
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 1: charge — signal spawns at person and grows ───────────────
        function phase1() {
          let f = 0;
          function tick() {
            f++;
            const t = f / CHARGE_FRAMES;
            const s = t < 0.5 ? 4*t*t*t : 1 - ((-2*t+2)**3) / 2;
            uMesh.scale.set(s, s, s);
            personMesh.material.emissiveIntensity = 0.6 + Math.sin(f * 1.5) * 0.5;
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < CHARGE_FRAMES) requestAnimationFrame(tick);
            else {
              personMesh.material.emissiveIntensity = 0.6;
              phase2();
            }
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 2: smooth approach from person to outer A frontier ──────────
        function phase2() {
          let f = 0;
          function tick() {
            f++;
            const t    = f / APPROACH_FRAMES;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            uMesh.position.lerpVectors(uStart, uArrival, ease);
            uMat.emissiveIntensity = 1.5 * (1 - t * 0.8);
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < APPROACH_FRAMES) requestAnimationFrame(tick);
            else phase3();
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 3: snap in as new A node (red) ─────────────────────────────
        function phase3() {
          uMat.color.setHex(COLOR_A);
          uMat.emissive.setRGB(1, 0.3, 0.2);
          uMat.emissiveIntensity = 2.5;

          const newIdx = simNodes.length;
          simNodes.push({
            id: 'newA', type: 'A',
            x: uMesh.position.x, y: uMesh.position.y, z: uMesh.position.z,
            vx: 0, vy: 0, vz: 0
          });
          nodes.push({ id: 'newA', mesh: uMesh });
          nodeById.set('newA', nodes[newIdx]);

          const spawnPt = uMesh.position.clone();
          nodes.slice(0, newIdx)
            .map((nd, i) => ({ i, dist: nd.mesh.position.distanceTo(spawnPt) }))
            .filter(({ i }) => simNodes[i] && simNodes[i].type === 'A')
            .sort((a, b) => a.dist - b.dist)
            .slice(0, 2)
            .forEach(({ i, dist }) => {
              const w = Math.max(0.3, Math.min(0.7, 1 - dist / 120));
              simEdges.push({ si: newIdx, ti: i, weight: w });
              edges.push({ si: newIdx, ti: i, weight: w,
                line: makeEdgeLine(uMesh.position, nodes[i].mesh.position, w) });
            });

          runSpring(simNodes, simEdges, SNAP_SPRING);

          simNodes.forEach(sn => {
            const p = new THREE.Vector3(sn.x, sn.y, sn.z);
            const ndc = p.clone().project(camera);
            if (Math.abs(ndc.x) > 0.75 || Math.abs(ndc.y) > 0.75) {
              const c = clampToView(p);
              sn.x = c.x; sn.y = c.y; sn.z = c.z; sn.vx = 0; sn.vy = 0; sn.vz = 0;
            }
          });

          const startPos = new Map();
          nodes.forEach(nd => startPos.set(nd.id, nd.mesh.position.clone()));

          let f = 0;
          function tick() {
            f++;
            const t    = f / LERP_FRAMES;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            simNodes.forEach((sn, i) => {
              const nd = nodes[i]; if (!nd) return;
              const s = startPos.get(nd.id); if (!s) return;
              nd.mesh.position.set(s.x+(sn.x-s.x)*ease, s.y+(sn.y-s.y)*ease, s.z+(sn.z-s.z)*ease);
            });
            uMat.emissiveIntensity = Math.max(0, 2.5 * (1 - t));
            edges.forEach(e => {
              const p1 = nodes[e.si]?.mesh.position;
              const p2 = nodes[e.ti]?.mesh.position;
              if (p1 && p2) writeEdgeBuffer(e.line, p1, p2, e.weight);
            });
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < LERP_FRAMES) requestAnimationFrame(tick);
            else phase4(newIdx);
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 4: spring reorganise toward B cluster (still red) ──────────
        function phase4(newIdx) {
          simNodes[newIdx].type = 'B';

          simEdges.forEach(se => {
            if (se.si === newIdx || se.ti === newIdx) {
              const otherIdx = se.si === newIdx ? se.ti : se.si;
              if (simNodes[otherIdx].type === 'B') {
                se.weight = Math.max(se.weight, 0.75);
                const edgeObj = edges.find(e => e.si === se.si && e.ti === se.ti);
                if (edgeObj) edgeObj.line.material.opacity = Math.min(1, 0.15 + se.weight * 0.55);
              }
            }
          });

          const hasBond = simEdges.some(se =>
            (se.si === 0 && se.ti === newIdx) || (se.si === newIdx && se.ti === 0)
          );
          if (!hasBond) {
            simEdges.push({ si: 0, ti: newIdx, weight: 0.85 });
            edges.push({ si: 0, ti: newIdx, weight: 0.85,
              line: makeEdgeLine(nodes[0].mesh.position, nodes[newIdx].mesh.position, 0.85) });
          } else {
            simEdges.forEach(se => {
              if ((se.si === 0 && se.ti === newIdx) || (se.si === newIdx && se.ti === 0)) {
                se.weight = Math.max(se.weight, 0.85);
                const edgeObj = edges.find(e =>
                  (e.si === 0 && e.ti === newIdx) || (e.si === newIdx && e.ti === 0));
                if (edgeObj) edgeObj.line.material.opacity = Math.min(1, 0.15 + 0.85 * 0.55);
              }
            });
          }

          runSpring(simNodes, simEdges, MATURE_SPRING);

          simNodes.forEach(sn => {
            const p = new THREE.Vector3(sn.x, sn.y, sn.z);
            const ndc = p.clone().project(camera);
            if (Math.abs(ndc.x) > 0.75 || Math.abs(ndc.y) > 0.75) {
              const c = clampToView(p);
              sn.x = c.x; sn.y = c.y; sn.z = c.z; sn.vx = 0; sn.vy = 0; sn.vz = 0;
            }
          });

          const startPos = new Map();
          nodes.forEach(nd => startPos.set(nd.id, nd.mesh.position.clone()));

          let f = 0;
          function tick() {
            f++;
            const t    = f / MATURE_LERP;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            simNodes.forEach((sn, i) => {
              const nd = nodes[i]; if (!nd) return;
              const s = startPos.get(nd.id); if (!s) return;
              nd.mesh.position.set(s.x+(sn.x-s.x)*ease, s.y+(sn.y-s.y)*ease, s.z+(sn.z-s.z)*ease);
            });
            edges.forEach(e => {
              const p1 = nodes[e.si]?.mesh.position;
              const p2 = nodes[e.ti]?.mesh.position;
              if (p1 && p2) writeEdgeBuffer(e.line, p1, p2, e.weight);
            });
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < MATURE_LERP) requestAnimationFrame(tick);
            else phase5(newIdx);
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 5: colour snap → green (maturation, now near B cluster) ────
        function phase5(newIdx) {
          uMat.color.setHex(COLOR_B);
          uMat.emissive.setRGB(0.3, 1, 0.5);
          uMat.emissiveIntensity = 3.5;
          let f = 0;
          function tick() {
            f++;
            uMat.emissiveIntensity = 3.5 * (1 - f / SNAP_FRAMES);
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < SNAP_FRAMES) requestAnimationFrame(tick);
            else { uMat.emissiveIntensity = 0; phase6(newIdx); }
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 6: size lerp A → B ──────────────────────────────────────────
        function phase6(newIdx) {
          const endScale = RADIUS_B / RADIUS_A;
          let f = 0;
          function tick() {
            f++;
            const t = f / SIZE_FRAMES;
            const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
            const s = 1 + (endScale - 1) * ease;
            uMesh.scale.set(s, s, s);
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < SIZE_FRAMES) requestAnimationFrame(tick);
            else phase7(newIdx);
          }
          requestAnimationFrame(tick);
        }

        // ── Phase 7: dominant binary orbit ────────────────────────────────────
        // newB (nodes[newIdx]) grows larger and brighter — becomes the primary body.
        // B0 (nodes[0]) shrinks — becomes the moon.
        // Both remain in mutual orbit, integrated with the broader B cluster.
        function phase7(newIdx) {
          const b0Mesh = nodes[0].mesh;
          const nbMesh = nodes[newIdx].mesh;

          const orbitCentre = new THREE.Vector3(
            (b0Mesh.position.x + nbMesh.position.x) / 2,
            (b0Mesh.position.y + nbMesh.position.y) / 2,
            (b0Mesh.position.z + nbMesh.position.z) / 2
          );

          const halfDist = b0Mesh.position.distanceTo(nbMesh.position) / 2;
          const orbitR = Math.max(MIN_ORBIT_R, halfDist);

          const toB0 = b0Mesh.position.clone().sub(orbitCentre);
          let angle = Math.atan2(toB0.y, toB0.x);
          const orbitZ = orbitCentre.z;

          // newB scale starts at 1.5 (end of SIZE_FRAMES), grows to 2.0 (dominant)
          // B0 scale starts at 1.0, shrinks to 0.5 (moon)
          const nbScaleStart = RADIUS_B / RADIUS_A; // 1.5
          const nbScaleEnd   = 2.0;
          const b0ScaleStart = 1.0;
          const b0ScaleEnd   = 0.5;

          // Snap to exact orbital radius
          b0Mesh.position.set(
            orbitCentre.x + Math.cos(angle) * orbitR,
            orbitCentre.y + Math.sin(angle) * orbitR,
            orbitZ
          );
          nbMesh.position.set(
            orbitCentre.x + Math.cos(angle + Math.PI) * orbitR,
            orbitCentre.y + Math.sin(angle + Math.PI) * orbitR,
            orbitZ
          );

          // newB material (currently uMat) — add emissive glow as it grows dominant
          uMat.emissive.setRGB(0.2, 0.9, 0.4);

          function updateOrbitalEdges() {
            edges.forEach(e => {
              if (e.si === 0 || e.ti === 0 || e.si === newIdx || e.ti === newIdx) {
                const p1 = nodes[e.si]?.mesh.position;
                const p2 = nodes[e.ti]?.mesh.position;
                if (p1 && p2) writeEdgeBuffer(e.line, p1, p2, e.weight);
              }
            });
          }

          let f = 0;
          function tick() {
            f++;
            angle += ORBIT_SPEED;

            // Size and brightness shift during first SCALE_FRAMES frames
            if (f <= SCALE_FRAMES) {
              const t    = f / SCALE_FRAMES;
              const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

              // newB grows dominant: scale up, glow emerges
              const nbScale = nbScaleStart + (nbScaleEnd - nbScaleStart) * ease;
              nbMesh.scale.set(nbScale, nbScale, nbScale);
              uMat.emissiveIntensity = 0.8 * ease;

              // B0 shrinks to moon: scale down
              const b0Scale = b0ScaleStart + (b0ScaleEnd - b0ScaleStart) * ease;
              b0Mesh.scale.set(b0Scale, b0Scale, b0Scale);
            }

            b0Mesh.position.set(
              orbitCentre.x + Math.cos(angle) * orbitR,
              orbitCentre.y + Math.sin(angle) * orbitR,
              orbitZ
            );
            nbMesh.position.set(
              orbitCentre.x + Math.cos(angle + Math.PI) * orbitR,
              orbitCentre.y + Math.sin(angle + Math.PI) * orbitR,
              orbitZ
            );
            updateOrbitalEdges();
            tickSmoke(personPos);
            renderFrame(); if (onFrame) onFrame();
            if (f < ORBIT_FRAMES) requestAnimationFrame(tick);
            else {
              animating = false;
              exportBtn.disabled = false;
              setStatus('Done.');
              resolve();
            }
          }
          requestAnimationFrame(tick);
        }

        renderFrame(); if (onFrame) onFrame();
        phase0();
      });
    }

    // ─── GIF Export ───────────────────────────────────────────────────────────
    async function createGifEncoder() {
      let workerSrc;
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
        if (!resp.ok) throw new Error('fetch failed');
        const text = await resp.text();
        workerSrc = URL.createObjectURL(new Blob([text], { type: 'application/javascript' }));
      } catch (_) {
        workerSrc = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js';
      }
      return new GIF({ workers: 2, quality: 8, width: W, height: H, workerScript: workerSrc });
    }

    async function exportGif() {
      if (gifCapturing || animating) return;
      gifCapturing = true;
      exportBtn.disabled = true;
      setStatus('Preparing GIF encoder…');
      setError('');

      let gif;
      try {
        gif = await createGifEncoder();
      } catch (e) {
        setError('Export failed: could not create GIF encoder.');
        gifCapturing = false;
        exportBtn.disabled = false;
        return;
      }

      const delay = Math.round(1000 / GIF_FPS);
      function captureFrame() {
        gif.addFrame(renderer.domElement, { copy: true, delay });
      }

      buildBaseGraph();
      renderFrame();
      setStatus('Capturing animation…');

      await runAnimation(captureFrame);

      for (let i = 0; i < 25; i++) captureFrame();

      gif.on('finished', blob => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = 'mal4-feedback-integrated-dominant.gif';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 200);
        gifCapturing = false;
        exportBtn.disabled = false;
        setStatus('GIF downloaded.');
      });

      gif.on('error', err => {
        setError('Export failed: ' + (err?.message ?? String(err)));
        gifCapturing = false;
        exportBtn.disabled = false;
      });

      setTimeout(() => {
        if (gifCapturing) {
          setError('Export timed out. Try again.');
          gifCapturing = false;
          exportBtn.disabled = false;
        }
      }, 90000);

      setStatus('Rendering GIF (this takes ~20–30s)…');
      gif.render();
    }

    // ─── Utility ─────────────────────────────────────────────────────────────
    function rnd() { return Math.random(); }
    function shuffle(arr) {
      for (let i = arr.length-1; i > 0; i--) {
        const j = Math.floor(rnd()*(i+1)); [arr[i],arr[j]] = [arr[j],arr[i]];
      }
      return arr;
    }

    // ─── Rotation & render ────────────────────────────────────────────────────
    function renderFrame() {
      const t = performance.now();
      scene.rotation.y = t * 0.00015;
      scene.rotation.x = Math.sin(t * 0.0003) * 0.10;
      renderer.render(scene, camera);
    }

    // ─── Render loop ─────────────────────────────────────────────────────────
    function startRenderLoop() {
      if (loopStarted) return;
      loopStarted = true;
      (function loop() {
        requestAnimationFrame(loop);
        if (!animating && !gifCapturing) {
          if (personMesh) tickSmoke(new THREE.Vector3(PERSON_X, PERSON_Y, PERSON_Z));
          renderFrame();
        }
      })();
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    exportBtn.addEventListener('click', exportGif);

    try {
      buildBaseGraph();
      renderFrame();
      setStatus('Starting animation…');
      startRenderLoop();
      setTimeout(() => runAnimation(null), 600);
    } catch (e) {
      setError('Init error: ' + e.message);
      console.error(e);
    }
  </script>
</body>
</html>
